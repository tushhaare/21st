<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift For Duddu Raani ❤️</title>

    <link rel="stylesheet" href="css/countdown.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="floating-hearts"></div>

    <main class="container">

        <p class="special-text">A Special Gift For</p>

        <h1 class="title">
            Duddu Raani ❤️
        </h1>

        <div class="teddy">
            🧸
        </div>

        <p class="subtitle">
            Guarding your birthday surprise...
        </p>

        <div class="countdown-card">

            <div class="time-box">
                <span id="days">00</span>
                <small>Days</small>
            </div>

            <div class="time-box">
                <span id="hours">00</span>
                <small>Hours</small>
            </div>

            <div class="time-box">
                <span id="minutes">00</span>
                <small>Minutes</small>
            </div>

            <div class="time-box">
                <span id="seconds">00</span>
                <small>Seconds</small>
            </div>

        </div>

        <button id="giftBtn" class="gift-btn">
            🎁 Open Gift
        </button>

        <div id="messageBox" class="message-box">
            The teddy is protecting your gift 🧸
        </div>

        <p class="footer">
            Made with love by Tushar ❤️
        </p>

    </main>

    <script src="js/countdown.js"></script>

</body>
</html>
